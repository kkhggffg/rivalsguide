<head>

  <style>
    :root {
      --red:#e63946; --gold:#ffd60a; --dark:#0a0a0f; --dark2:#12121a;
      --dark3:#1a1a2e; --card:#16213e; --text:#e0e0e0; --muted:#888;
      --border:rgba(230,57,70,0.3); --green:#4ade80; --blue:#60a5fa;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;overflow-x:hidden}

    /* ── NAV ── */
    nav{position:fixed;top:0;width:100%;z-index:999;background:rgba(10,10,15,0.95);
      backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
      padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
    .nav-logo{font-size:1.3rem;font-weight:900;color:var(--red);letter-spacing:1px;text-decoration:none}
    .nav-logo span{color:var(--gold)}
    .nav-back{color:var(--muted);text-decoration:none;font-size:0.9rem;
      display:flex;align-items:center;gap:8px;transition:color 0.2s}
    .nav-back:hover{color:var(--red)}

    /* ── HERO BANNER ── */
    .hero-banner{min-height:340px;background:
      radial-gradient(ellipse at 30% 50%,rgba(230,57,70,0.2) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 30%,rgba(255,214,10,0.06) 0%,transparent 50%),
      var(--dark);
      display:flex;align-items:center;padding:100px 40px 60px;position:relative;overflow:hidden}
    .hero-banner::before{content:'🕷';position:absolute;right:80px;top:50%;
      transform:translateY(-50%);font-size:12rem;opacity:0.06;pointer-events:none}
    .banner-inner{max-width:1200px;margin:0 auto;width:100%}
    .breadcrumb{font-size:0.8rem;color:var(--muted);margin-bottom:16px}
    .breadcrumb a{color:var(--muted);text-decoration:none}
    .breadcrumb a:hover{color:var(--red)}
    .breadcrumb span{margin:0 8px}
    .banner-role{display:inline-block;background:rgba(230,57,70,0.15);border:1px solid var(--border);
      color:var(--red);font-size:0.75rem;padding:3px 14px;border-radius:20px;
      margin-bottom:16px;letter-spacing:2px;text-transform:uppercase}
    .banner-title{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:900;line-height:1.1;
      margin-bottom:12px;text-shadow:0 0 40px rgba(230,57,70,0.3)}
    .banner-title .accent{color:var(--red)}
    .banner-sub{color:var(--muted);font-size:1rem;max-width:560px;line-height:1.6;margin-bottom:28px}
    .banner-tags{display:flex;gap:10px;flex-wrap:wrap}
    .tag{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      padding:5px 14px;border-radius:20px;font-size:0.8rem;color:var(--muted)}
    .tag.red{border-color:var(--border);color:var(--red);background:rgba(230,57,70,0.08)}
    .tag.gold{border-color:rgba(255,214,10,0.3);color:var(--gold);background:rgba(255,214,10,0.06)}

    /* ── LAYOUT ── */
    .page-body{max-width:1200px;margin:0 auto;padding:60px 40px 80px;display:grid;
      grid-template-columns:1fr 320px;gap:40px;align-items:start}
    .main-col{display:flex;flex-direction:column;gap:48px}
    .side-col{display:flex;flex-direction:column;gap:24px;position:sticky;top:84px}

    /* ── SECTION ── */
    .section{background:var(--card);border:1px solid rgba(255,255,255,0.05);
      border-radius:12px;padding:32px;transition:border-color 0.2s}
    .section:hover{border-color:var(--border)}
    .section-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:3px;
      color:var(--red);margin-bottom:8px;font-weight:700}
    h2{font-size:1.5rem;font-weight:900;margin-bottom:20px;line-height:1.2}
    h2 span{color:var(--red)}
    h3{font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)}
    p{color:var(--muted);line-height:1.7;font-size:0.93rem}

    /* ── STATS CARD ── */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
    .stat-box{background:var(--dark2);border-radius:8px;padding:16px;text-align:center;
      border:1px solid rgba(255,255,255,0.04)}
    .stat-val{font-size:1.4rem;font-weight:900;color:var(--red);display:block}
    .stat-key{font-size:0.72rem;color:var(--muted);text-transform:uppercase;
      letter-spacing:1px;margin-top:4px;display:block}
    .difficulty-bar{display:flex;gap:4px;justify-content:center;margin-top:6px}
    .diff-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.1)}
    .diff-dot.filled{background:var(--red)}
    .stat-desc{color:var(--muted);font-size:0.88rem;line-height:1.6}

    /* ── ABILITIES ── */
    .ability-list{display:flex;flex-direction:column;gap:16px}
    .ability-item{background:var(--dark2);border:1px solid rgba(255,255,255,0.05);
      border-radius:10px;padding:20px;display:flex;gap:16px;
      transition:border-color 0.2s;align-items:flex-start}
    .ability-item:hover{border-color:var(--border)}
    .ability-key{background:var(--red);color:#fff;padding:4px 12px;border-radius:5px;
      font-size:0.78rem;font-weight:700;font-family:monospace;white-space:nowrap;
      flex-shrink:0;margin-top:2px;min-width:52px;text-align:center}
    .ability-key.ult{background:var(--gold);color:#000}
    .ability-key.passive{background:rgba(96,165,250,0.2);color:var(--blue);
      border:1px solid rgba(96,165,250,0.3)}
    .ability-body{flex:1}
    .ability-name{font-weight:700;font-size:1rem;margin-bottom:6px}
    .ability-desc{color:var(--muted);font-size:0.88rem;line-height:1.65;margin-bottom:8px}
    .ability-stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
    .ability-stat-chip{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
      padding:2px 10px;border-radius:12px;font-size:0.75rem;color:var(--text)}
    .ability-stat-chip .label{color:var(--muted);margin-right:4px}
    .ability-tip{font-size:0.82rem;color:var(--gold);padding:8px 12px;
      background:rgba(255,214,10,0.06);border-radius:6px;border-left:2px solid var(--gold)}

    /* ── COUNTERS ── */
    .counter-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .counter-col{background:var(--dark2);border-radius:10px;padding:20px}
    .counter-col-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;
      letter-spacing:1px;margin-bottom:14px}
    .counter-col.good .counter-col-title{color:var(--green)}
    .counter-col.bad .counter-col-title{color:#f87171}
    .counter-entry{display:flex;align-items:flex-start;gap:10px;
      padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .counter-entry:last-child{border-bottom:none;padding-bottom:0}
    .counter-emoji{font-size:1.3rem;flex-shrink:0;margin-top:1px}
    .counter-name{font-weight:700;font-size:0.88rem;margin-bottom:2px}
    .counter-reason{font-size:0.78rem;color:var(--muted);line-height:1.5}

    /* ── TEAM COMP ── */
    .comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .comp-card{background:var(--dark2);border-radius:10px;padding:16px;
      border:1px solid rgba(255,255,255,0.04);transition:border-color 0.2s}
    .comp-card:hover{border-color:var(--border)}
    .comp-role{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;
      font-weight:700;margin-bottom:10px}
    .comp-role.tank{color:var(--blue)}
    .comp-role.support{color:var(--green)}
    .comp-role.dps{color:var(--red)}
    .comp-hero{display:flex;align-items:center;gap:8px;
      padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .comp-hero:last-child{border-bottom:none}
    .comp-hero-emoji{font-size:1.1rem}
    .comp-hero-info{flex:1}
    .comp-hero-name{font-size:0.85rem;font-weight:700}
    .comp-hero-reason{font-size:0.75rem;color:var(--muted)}

    /* ── COMBO ── */
    .combo-steps{list-style:none;display:flex;flex-direction:column;gap:0}
    .combo-step{display:flex;gap:16px;padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);align-items:flex-start}
    .combo-step:last-child{border-bottom:none}
    .step-num{width:32px;height:32px;min-width:32px;background:var(--red);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:0.88rem;flex-shrink:0}
    .step-body{flex:1}
    .step-title{font-weight:700;font-size:0.95rem;margin-bottom:4px;
      display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .key-badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);
      padding:1px 9px;border-radius:4px;font-size:0.75rem;font-family:monospace}
    .step-desc{color:var(--muted);font-size:0.88rem;line-height:1.6}
    .combo-note{background:rgba(230,57,70,0.07);border:1px solid var(--border);
      border-radius:8px;padding:14px 16px;margin-top:16px;
      font-size:0.85rem;color:var(--text);line-height:1.6}
    .combo-note strong{color:var(--red)}

    /* ── FAQ ── */
    .faq-list{display:flex;flex-direction:column;gap:0}
    .faq-item{border-bottom:1px solid rgba(255,255,255,0.05)}
    .faq-item:last-child{border-bottom:none}
    .faq-q{width:100%;background:transparent;border:none;color:var(--text);
      text-align:left;padding:18px 0;font-size:0.95rem;font-weight:700;
      cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .faq-q:hover{color:var(--red)}
    .faq-arrow{color:var(--muted);font-size:0.8rem;transition:transform 0.2s;flex-shrink:0}
    .faq-item.open .faq-arrow{transform:rotate(180deg)}
    .faq-a{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
    .faq-item.open .faq-a{max-height:200px}
    .faq-a p{padding-bottom:16px;font-size:0.88rem}

    /* ── SIDEBAR ── */
    .side-card{background:var(--card);border:1px solid rgba(255,255,255,0.05);
      border-radius:12px;padding:24px}
    .side-card-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:2px;
      color:var(--red);font-weight:700;margin-bottom:16px}
    .quick-tip{display:flex;gap:10px;padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);align-items:flex-start}
    .quick-tip:last-child{border-bottom:none}
    .tip-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
    .tip-text{font-size:0.82rem;color:var(--muted);line-height:1.5}
    .tier-badge{display:inline-flex;align-items:center;justify-content:center;
      width:56px;height:56px;border-radius:12px;font-size:2rem;font-weight:900;
      margin-bottom:12px}
    .tier-s{background:#ff4757}
    .tier-a{background:#ff6b35}
    .tier-b{background:#ffd60a;color:#000}
    .patch-note{font-size:0.8rem;color:var(--muted);line-height:1.6}
    .patch-note strong{color:var(--text)}
    .ai-btn-side{width:100%;background:var(--red);color:#fff;border:none;
      padding:13px;border-radius:8px;font-size:0.9rem;font-weight:700;
      cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;text-align:center}
    .ai-btn-side:hover{background:#ff4757;box-shadow:0 0 20px rgba(230,57,70,0.4)}

    /* ── FOOTER ── */
    footer{background:var(--dark2);border-top:1px solid var(--border);
      padding:40px;text-align:center;color:var(--muted);font-size:0.85rem}
    .footer-logo{font-size:1.2rem;font-weight:900;color:var(--red);margin-bottom:8px}

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--dark)}
    ::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .page-body{grid-template-columns:1fr;padding:40px 20px 60px}
      .side-col{position:static}
      .counter-grid{grid-template-columns:1fr}
      .comp-grid{grid-template-columns:1fr 1fr}
      .hero-banner{padding:90px 20px 48px}
      nav{padding:0 20px}
    }
    @media(max-width:560px){
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .comp-grid{grid-template-columns:1fr}
    }
  </style>
</head>
